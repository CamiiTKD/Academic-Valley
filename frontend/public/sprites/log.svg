<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Log body (side view) -->
  <rect x="1" y="5" width="14" height="7" fill="#7a3e0e"/>
  <!-- Wood grain lines -->
  <rect x="1" y="7" width="14" height="1" fill="#5c2d08" opacity="0.6"/>
  <rect x="1" y="9" width="14" height="1" fill="#5c2d08" opacity="0.4"/>
  <!-- Left end cap (oval cross-section) -->
  <rect x="0" y="6" width="3" height="5" fill="#a05020"/>
  <rect x="1" y="5" width="1" height="7" fill="#a05020"/>
  <!-- Ring on left cap -->
  <rect x="1" y="7" width="2" height="1" fill="#7a3e0e"/>
  <!-- Right end cap -->
  <rect x="13" y="6" width="3" height="5" fill="#8a4218"/>
  <rect x="14" y="5" width="1" height="7" fill="#8a4218"/>
  <!-- Highlight top -->
  <rect x="1" y="5" width="14" height="1" fill="#c07838" opacity="0.5"/>
  <!-- Bark texture knots -->
  <rect x="4"  y="8" width="2" height="1" fill="#3d1a04" opacity="0.5"/>
  <rect x="10" y="6" width="2" height="1" fill="#3d1a04" opacity="0.4"/>
  <!-- Shadow bottom -->
  <rect x="1" y="11" width="14" height="1" fill="#3d1a04" opacity="0.5"/>
  <!-- Axe cut marks on top -->
  <rect x="5" y="4" width="1" height="2" fill="#f0c040"/>
  <rect x="6" y="3" width="2" height="1" fill="#f0c040"/>
  <rect x="6" y="4" width="1" height="1" fill="#b08828"/>
</svg>
