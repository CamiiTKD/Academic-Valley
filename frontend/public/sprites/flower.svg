<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Stem -->
  <rect x="7" y="9"  width="2" height="6" fill="#3a8020"/>
  <rect x="6" y="11" width="1" height="1" fill="#3a8020"/>
  <!-- Leaves -->
  <rect x="4" y="10" width="3" height="2" fill="#4aaa28"/>
  <rect x="9" y="11" width="3" height="2" fill="#4aaa28"/>
  <!-- Leaf tips -->
  <rect x="3" y="10" width="1" height="1" fill="#3a8020"/>
  <rect x="11" y="11" width="1" height="1" fill="#3a8020"/>
  <!-- Petals (purple/pink) -->
  <rect x="6" y="3" width="4" height="2" fill="#d060d0"/>
  <rect x="5" y="4" width="2" height="3" fill="#d060d0"/>
  <rect x="9" y="4" width="2" height="3" fill="#d060d0"/>
  <rect x="6" y="7" width="4" height="2" fill="#d060d0"/>
  <!-- Center of flower -->
  <rect x="6" y="5" width="4" height="3" fill="#f0e040"/>
  <rect x="7" y="4" width="2" height="1" fill="#f0e040"/>
  <rect x="7" y="8" width="2" height="1" fill="#f0e040"/>
  <!-- Center detail -->
  <rect x="7" y="6" width="2" height="1" fill="#b8a820"/>
  <!-- Petal highlights -->
  <rect x="6" y="3" width="4" height="1" fill="#e880e8" opacity="0.6"/>
  <rect x="5" y="4" width="1" height="1" fill="#e880e8" opacity="0.6"/>
  <rect x="9" y="4" width="1" height="1" fill="#e880e8" opacity="0.6"/>
  <!-- Petal shadows -->
  <rect x="6" y="8" width="4" height="1" fill="#9040a0" opacity="0.5"/>
  <rect x="5" y="6" width="1" height="1" fill="#9040a0" opacity="0.4"/>
  <rect x="10" y="6" width="1" height="1" fill="#9040a0" opacity="0.4"/>
</svg>
